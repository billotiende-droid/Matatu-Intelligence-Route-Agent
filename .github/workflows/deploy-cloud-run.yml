name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker europe-west2-docker.pkg.dev
      
      - name: Build and Push Docker image
        run: |
          gcloud builds submit \
            --tag europe-west2-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-run-source-deploy/matatu-route-intelligence-agent:latest \
            --project ${{ vars.GCP_PROJECT_ID }}
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy matatu-route-intelligence-agent \
            --image europe-west2-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-run-source-deploy/matatu-route-intelligence-agent:latest \
            --platform managed \
            --region europe-west2 \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --port 3000
