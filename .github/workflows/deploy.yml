name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Google Cloud CLI
      run: |
        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
        if [ -z "$PROJECT_ID" ]; then
          PROJECT_ID="${{ steps.auth.outputs.project_id }}"
        fi
        
        if [ -z "$PROJECT_ID" ]; then
          echo "::error::Google Cloud Project ID could not be determined. Please ensure GCP_SA_KEY is valid or GCP_PROJECT_ID secret is set."
          exit 1
        fi
        
        echo "Configuring gcloud default project to: $PROJECT_ID"
        gcloud config set project "$PROJECT_ID"
        echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

    - name: Remove stale source annotations (Fixes Cloud Run Validation Error)
      run: |
        gcloud run services update matatu-route-intelligence-agent \
          --remove-annotations=run.googleapis.com/sources \
          --region=europe-west2 \
          --platform=managed || echo "Annotation cleanup skipped (e.g. if service doesn't exist yet or is already clean)."

    - name: Build and Deploy to Cloud Run
      run: |
        echo "Deploying to Google Cloud Project: $PROJECT_ID"
        
        gcloud builds submit --tag gcr.io/$PROJECT_ID/matatu-route-intelligence-agent:latest
        
        gcloud run deploy matatu-route-intelligence-agent \
          --image gcr.io/$PROJECT_ID/matatu-route-intelligence-agent:latest \
          --region europe-west2 \
          --platform managed \
          --allow-unauthenticated \
          --clear-sources
